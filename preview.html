<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Followup Distributor</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{text-align:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
textarea{width:100%;height:220px;padding:10px}
button{background:#0d6efd;color:#fff;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}
button:hover{opacity:.9}
#preview{margin-top:15px;background:#eef;padding:10px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h1>WhatsApp Followup Distributor</h1>

<div class="grid">
<div>
<h3>Phone Numbers (one per line)</h3>
<textarea id="numbers"></textarea>
</div>

<div>
<h3>Haribhakt Names (one per line)</h3>
<textarea id="names"></textarea>
</div>
</div>

<h3>Message</h3>
<textarea id="message">દયાળુ, જય સ્વામિનારાયણ</textarea>

<br><br>
<button onclick="generateZip()">Distribute & Download ZIP</button>

<div id="preview"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
function cleanNumber(num){
    num=num.replace(/\D/g,'');
    if(num.startsWith('91') && num.length===12) num=num.substring(2);
    return num;
}

function distribute(numbers,names){
    let result=[];
    const per=Math.ceil(numbers.length/names.length);
    let start=0;

    for(let i=0;i<names.length;i++){
        let end=Math.min(start+per,numbers.length);
        result.push({
            name:names[i],
            records:numbers.slice(start,end),
            start:start+1,
            end:end
        });
        start=end;
    }
    return result;
}

function createVolunteerHTML(name,records,msg){
const encoded=encodeURIComponent(msg);

let rows='';
records.forEach((n,i)=>{
rows+=`
<tr>
<td>${i+1}</td>
<td>${n}</td>
<td><a href="https://wa.me/91${n}?text=${encoded}" target="_blank">📱 WhatsApp</a></td>
<td><a href="tel:+91${n}">📞 Call</a></td>
</tr>`;
});

return `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${name}</title>
<style>
body{font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#f0f0f0}
input{padding:8px;width:300px;margin-bottom:10px}
</style>
</head>
<body>
<h2>${name}</h2>
<p>Total Records: ${records.length}</p>
<input type="text" id="search" placeholder="Search Number..." onkeyup="filterTable()">
<table id="tbl">
<thead>
<tr><th>Sr</th><th>Phone</th><th>WhatsApp</th><th>Call</th></tr>
</thead>
<tbody>${rows}</tbody>
</table>

<script>
function filterTable(){
let v=document.getElementById('search').value.toLowerCase();
let rows=document.querySelectorAll('#tbl tbody tr');
rows.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?'':'none';
});
}
<\/script>
</body>
</html>`;
}

async function generateZip(){
const numbers=document.getElementById('numbers').value
.split('\n').map(cleanNumber).filter(x=>x.length===10);

const names=document.getElementById('names').value
.split('\n').map(x=>x.trim()).filter(Boolean);

const message=document.getElementById('message').value;

if(!numbers.length || !names.length){
alert('Enter numbers and names');
return;
}

const groups=distribute(numbers,names);

let html='<h3>Distribution Preview</h3>';
groups.forEach(g=>{
html+=`${g.name} → ${g.records.length} Records<br>`;
});
document.getElementById('preview').innerHTML=html;

const zip=new JSZip();

groups.forEach(g=>{
if(g.records.length===0) return;

const filename=`${g.start}_${g.end}_${g.name.toLowerCase().replace(/\s+/g,'_')}.html`;
zip.file(filename,createVolunteerHTML(g.name,g.records,message));
});

const blob=await zip.generateAsync({type:'blob'});

const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='Followup_Files.zip';
a.click();
}
</script>
</body>
</html>
